workflows:
  android-workflow:
    name: WhatsApp Pro APK Build
    instance_type: linux_x86_64
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: | 
          npm install
      - name: Expo Prebuild
        script: | 
          npx expo prebuild --platform android
      - name: Build Android APK
        script: | 
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      
